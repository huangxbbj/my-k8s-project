# The CI/CD pipeline script 
name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Triggers the build whenever you push to main

jobs:
  build-and-deploy:
    runs-on: self-hosted #

    steps:
      # 1. Pull the code from your repo into the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Authenticate with your Docker Registry (DockerHub, GHCR, etc.)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build the image and tag it with the unique GitHub Commit SHA
      # This ensures every deployment has a unique version number
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}

      # Deployment Step
      - name: Deploy to Kubernetes
        run: |
          # 1. Update the image in your deployment file automatically
          sed -i "s|image:.*|image: ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}|g" k8s/deployment.yaml
          
          # 2. Apply the files using the kubectl that is already in your WSL
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          
          # 3. Check status
          kubectl get pods

