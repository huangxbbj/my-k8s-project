# The CI/CD pipeline script
name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Triggers the build whenever you push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from your repo into the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Authenticate with your Docker Registry (DockerHub, GHCR, etc.)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.xiaobin1234 }}
          password: ${{ secrets.dckr_pat_o0QMq6ZSqJdiYUSv9DG_S_Dxwko }}

      # 3. Build the image and tag it with the unique GitHub Commit SHA
      # This ensures every deployment has a unique version number
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.xiaobin1234 }}/my-app:${{ github.sha }}

      # 4. Connect to your Kubernetes Cluster
      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      # 5. Deploy to Kubernetes
      # This step replaces the image in your manifest with the one we just built
      - name: Deploy to K8s
        uses: azure/k8s-deploy@v4
        with:
          images: ${{ secrets.xiaobin1234 }}/my-app:${{ github.sha }}
          manifests: |
            k8s/deployment.yaml
            k8s/service.yaml
